<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="'PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" rx="16" fill="url(#bg)"/>
  <text x="400" y="38" text-anchor="middle" fill="#fff" font-size="22" font-weight="bold">手机端 Hermes 方案对比</text>

  <!-- 方案一 -->
  <rect x="30" y="70" width="360" height="290" rx="12" fill="#1e2a3e" stroke="#00b4d8" stroke-width="2"/>
  <rect x="30" y="70" width="360" height="36" rx="12" fill="#0077b6"/>
  <rect x="30" y="88" width="360" height="18" fill="#0077b6"/>
  <text x="210" y="94" text-anchor="middle" fill="#fff" font-size="16" font-weight="bold">📱 方案一：Telegram 接入</text>
  <text x="210" y="114" text-anchor="middle" fill="#adf" font-size="13">推荐大多数用户使用</text>

  <!-- Phone -->
  <rect x="80" y="135" width="100" height="170" rx="14" fill="#333"/>
  <rect x="85" y="140" width="90" height="160" rx="10" fill="#1a1a1a"/>
  <rect x="120" y="143" width="20" height="4" rx="2" fill="#555"/>
  <rect x="85" y="150" width="90" height="60" rx="4" fill="#2a5d8f"/>
  <text x="130" y="170" text-anchor="middle" fill="#fff" font-size="10" font-weight="bold">Telegram</text>
  <rect x="90" y="178" width="20" height="12" rx="3" fill="#0f0"/>
  <text x="100" y="187" text-anchor="middle" fill="#fff" font-size="7">●</text>
  <text x="130" y="187" fill="#fff" font-size="8">Hermes</text>
  <text x="130" y="202" fill="#aaa" font-size="7">今天有什么新闻？</text>
  <rect x="90" y="215" width="75" height="18" rx="5" fill="#0057a3"/>
  <text x="127" y="228" text-anchor="middle" fill="#fff" font-size="7">AI 行业出大事了...</text>
  <text x="130" y="255" fill="#888" font-size="7">✉️ 文字消息</text>
  <text x="130" y="270" fill="#888" font-size="7">🎤 语音消息</text>
  <text x="130" y="285" fill="#888" font-size="7">📄 文件处理</text>

  <!-- 右边说明 -->
  <rect x="195" y="135" width="180" height="170" rx="8" fill="#0a1a2e"/>
  <text fill="#ccc" font-size="12">
    <tspan x="210" y="158">✅ 操作最简单</tspan>
    <tspan x="210" y="178">✅ 节省手机电量</tspan>
    <tspan x="210" y="198">✅ 跨平台（iOS/安卓）</tspan>
    <tspan x="210" y="218">✅ 免费使用</tspan>
    <tspan x="210" y="238">❌ 需要网络</tspan>
    <tspan x="210" y="258">❌ 国内需特殊方式</tspan>
    <tspan x="210" y="278">❌ 依赖电脑/服务器</tspan>
  </text>

  <text x="210" y="332" text-anchor="middle" fill="#888" font-size="11">手机遥控器模式，Hermes 跑在电脑/服务器上</text>

  <!-- 方案二 -->
  <rect x="410" y="70" width="360" height="290" rx="12" fill="#1e2a3e" stroke="#9b59b6" stroke-width="2"/>
  <rect x="410" y="70" width="360" height="36" rx="12" fill="#3d1f6e"/>
  <rect x="410" y="88" width="360" height="18" fill="#3d1f6e"/>
  <text x="590" y="94" text-anchor="middle" fill="#fff" font-size="16" font-weight="bold">🤖 方案二：Termux 直装</text>
  <text x="590" y="114" text-anchor="middle" fill="#dbf" font-size="13">适合喜欢折腾的用户</text>

  <!-- Phone -->
  <rect x="460" y="135" width="100" height="170" rx="14" fill="#333"/>
  <rect x="465" y="140" width="90" height="160" rx="10" fill="#1a1a1a"/>
  <rect x="500" y="143" width="20" height="4" rx="2" fill="#555"/>
  <rect x="465" y="150" width="90" height="60" rx="4" fill="#2d1b69"/>
  <text x="510" y="168" text-anchor="middle" fill="#0f0" font-size="7" font-weight="bold">Termux</text>
  <text x="510" y="188" fill="#5f5" font-size="7">$ hermes</text>
  <text x="510" y="202" fill="#aaa" font-size="7">Hermes ready!</text>
  <text x="510" y="255" fill="#888" font-size="7">🐧 Linux 环境</text>
  <text x="510" y="270" fill="#888" font-size="7">⚡ 完全独立</text>
  <text x="510" y="285" fill="#888" font-size="7">📟 终端界面</text>

  <!-- 右边说明 -->
  <rect x="575" y="135" width="180" height="170" rx="8" fill="#0a1a2e"/>
  <text fill="#ccc" font-size="12">
    <tspan x="590" y="158">✅ 完全独立运行</tspan>
    <tspan x="590" y="178">✅ 不依赖其他设备</tspan>
    <tspan x="590" y="198">✅ 数据全在手机上</tspan>
    <tspan x="590" y="218">✅ 离线也能用</tspan>
    <tspan x="590" y="238">❌ 需要终端操作</tspan>
    <tspan x="590" y="258">❌ 屏幕小不方便</tspan>
    <tspan x="590" y="278">❌ 仅限安卓</tspan>
  </text>

  <text x="590" y="332" text-anchor="middle" fill="#888" font-size="11">手机独立运行模式，Hermes 跑在手机上</text>

  <text x="400" y="380" text-anchor="middle" fill="#888" font-size="11">💡 推荐先用方案一（Telegram），想折腾了再试方案二（Termux）</text>
</svg>