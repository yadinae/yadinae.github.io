<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="'PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e94560"/>
    </marker>
  </defs>
  <rect width="800" height="400" rx="16" fill="url(#bg)"/>
  <text x="400" y="38" text-anchor="middle" fill="#fff" font-size="22" font-weight="bold">定时任务自动化工作流</text>

  <!-- Step 1: 一句话设置 -->
  <rect x="40" y="70" width="720" height="70" rx="12" fill="#1e2a3e" stroke="#e94560" stroke-width="1.5"/>
  <text x="70" y="100" fill="#e94560" font-size="16" font-weight="bold">🗣️ 你说一句话</text>
  <text x="70" y="122" fill="#ccc" font-size="13">"每天早上 8 点，把 GitHub 动态和天气发到我 Telegram"</text>

  <!-- Arrow -->
  <line x1="400" y1="140" x2="400" y2="170" stroke="#e94560" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- Step 2: Hermes 处理 -->
  <rect x="40" y="175" width="720" height="70" rx="12" fill="#1e2a3e" stroke="#00b4d8" stroke-width="1.5"/>
  <text x="70" y="205" fill="#00b4d8" font-size="16" font-weight="bold">⚙️ Hermes 自动配置</text>
  <text x="70" y="227" fill="#ccc" font-size="13">设置定时器 → 关联工具（GitHub API + 天气查询） → 绑定 Telegram 推送</text>

  <!-- Arrow -->
  <line x1="400" y1="245" x2="400" y2="275" stroke="#e94560" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- Step 3: 自动执行 -->
  <rect x="40" y="280" width="720" height="70" rx="12" fill="#1e2a3e" stroke="#06d6a0" stroke-width="1.5"/>
  <text x="70" y="310" fill="#06d6a0" font-size="16" font-weight="bold">⏰ 每天 8:00 自动执行</text>
  <text x="70" y="332" fill="#ccc" font-size="13">Hermes 收集 GitHub 动态 → 获取天气 → 生成日报 → 推送到你的 Telegram</text>

  <!-- 底部示例 -->
  <rect x="120" y="365" width="560" height="30" rx="8" fill="#0a1a2e"/>
  <text x="400" y="385" text-anchor="middle" fill="#888" font-size="12">☀️ 早上好！今日 GitHub: 3 new stars · 天气: 多云 21°C · 下午2点有会议</text>
</svg>