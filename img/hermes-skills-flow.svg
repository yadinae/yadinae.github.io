<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="'PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e94560"/>
    </marker>
  </defs>
  <rect width="800" height="400" rx="16" fill="url(#bg)"/>
  <text x="400" y="38" text-anchor="middle" fill="#fff" font-size="22" font-weight="bold">Hermes 技能生成流程</text>

  <!-- Step 1: 重复行为 -->
  <rect x="40" y="70" width="210" height="150" rx="12" fill="#1e2a3e" stroke="#e94560" stroke-width="1.5"/>
  <text x="145" y="100" text-anchor="middle" fill="#e94560" font-size="16" font-weight="bold">🔁 发现重复</text>
  <text fill="#ccc" font-size="12" text-anchor="middle">
    <tspan x="145" y="130">你第三次让 Hermes</tspan>
    <tspan x="145" y="148">做"文章总结"</tspan>
  </text>
  <line x1="70" y1="160" x2="220" y2="160" stroke="#333" stroke-width="0.5"/>
  <text fill="#888" font-size="11" text-anchor="middle">
    <tspan x="145" y="180">"嘿，我发现你经常让我</tspan>
    <tspan x="145" y="196">做这件事……"</tspan>
  </text>

  <!-- Arrow -->
  <line x1="250" y1="145" x2="290" y2="145" stroke="#e94560" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- Step 2: 生成技能 -->
  <rect x="295" y="70" width="210" height="150" rx="12" fill="#1e2a3e" stroke="#00b4d8" stroke-width="1.5"/>
  <text x="400" y="100" text-anchor="middle" fill="#00b4d8" font-size="16" font-weight="bold">⚙️ 生成技能</text>
  <text fill="#ccc" font-size="12" text-anchor="middle">
    <tspan x="400" y="130">自动创建技能文件</tspan>
    <tspan x="400" y="148">skills/article-summary.md</tspan>
  </text>
  <line x1="325" y1="160" x2="475" y2="160" stroke="#333" stroke-width="0.5"/>
  <text fill="#888" font-size="11" text-anchor="middle">
    <tspan x="400" y="180">记录步骤、格式、要求</tspan>
    <tspan x="400" y="196">下次可直接复用</tspan>
  </text>

  <!-- Arrow -->
  <line x1="505" y1="145" x2="545" y2="145" stroke="#e94560" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- Step 3: 随时复用 -->
  <rect x="550" y="70" width="210" height="150" rx="12" fill="#1e2a3e" stroke="#06d6a0" stroke-width="1.5"/>
  <text x="655" y="100" text-anchor="middle" fill="#06d6a0" font-size="16" font-weight="bold">✅ 随时复用</text>
  <text fill="#ccc" font-size="12" text-anchor="middle">
    <tspan x="655" y="130">以后只需要说：</tspan>
    <tspan x="655" y="148">"老方法总结一下"</tspan>
  </text>
  <line x1="580" y1="160" x2="730" y2="160" stroke="#333" stroke-width="0.5"/>
  <text fill="#888" font-size="11" text-anchor="middle">
    <tspan x="655" y="180">Hermes 自动调用</tspan>
    <tspan x="655" y="196">已学会的技能</tspan>
  </text>

  <!-- 你也能手动教 -->
  <rect x="150" y="260" width="500" height="90" rx="12" fill="#2a1e3e" stroke="#9b59b6" stroke-width="1.5"/>
  <text x="400" y="290" text-anchor="middle" fill="#dbf" font-size="16" font-weight="bold">✋ 也可以手动教它新技能</text>
  <text fill="#ccc" font-size="12" text-anchor="middle">
    <tspan x="400" y="315">"我教你一个技能。以后我说'日报'，你就按 完成事项 → 问题 → 计划 的格式来"</tspan>
    <tspan x="400" y="335">Hermes 立刻学会，以后"日报"两个字它就懂了</tspan>
  </text>

  <text x="400" y="385" text-anchor="middle" fill="#888" font-size="11">📌 技能文件存在你的电脑上 · 随时查看、修改、删除 · 不需要编程</text>
</svg>