<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 背景水墨渐变 -->
    <radialGradient id="bgGrad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" style="stop-color:#e8e4dc;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#d6d0c4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c4bba8;stop-opacity:1" />
    </radialGradient>
    <!-- 墨韵山峦渐变 -->
    <linearGradient id="mountainFar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8a8a8a;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#6a6a6a;stop-opacity:0.05" />
    </linearGradient>
    <linearGradient id="mountainMid" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5c5c5c;stop-opacity:0.35" />
      <stop offset="100%" style="stop-color:#4a4a4a;stop-opacity:0.1" />
    </linearGradient>
    <linearGradient id="mountainNear" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3a3a3a;stop-opacity:0.55" />
      <stop offset="100%" style="stop-color:#2a2a2a;stop-opacity:0.15" />
    </linearGradient>
    <!-- 科技蓝紫渐变 -->
    <linearGradient id="techWave" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4a55e8;stop-opacity:0.5" />
      <stop offset="50%" style="stop-color:#7c3aed;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:0.3" />
    </linearGradient>
    <linearGradient id="techGlow2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0.4" />
    </linearGradient>
  </defs>

  <!-- 宣纸底色 -->
  <rect width="200" height="200" fill="url(#bgGrad)" rx="20"/>

  <!-- 远山（最淡） -->
  <path d="M0,120 Q20,80 45,95 Q60,85 80,100 Q95,75 120,90 Q140,70 160,85 Q180,75 200,95 L200,200 L0,200 Z"
        fill="url(#mountainFar)" opacity="0.6"/>

  <!-- 中景山 -->
  <path d="M0,140 Q15,110 35,125 Q55,100 75,115 Q90,90 110,105 Q130,85 155,100 Q175,80 200,105 L200,200 L0,200 Z"
        fill="url(#mountainMid)" opacity="0.8"/>

  <!-- 近景山（最浓） -->
  <path d="M0,165 Q25,140 50,155 Q70,130 90,145 Q105,120 125,135 Q145,115 170,130 Q185,110 200,130 L200,200 L0,200 Z"
        fill="url(#mountainNear)" opacity="0.9"/>

  <!-- 山间墨点（苔点） -->
  <circle cx="60" cy="148" r="2.5" fill="#4a4a4a" opacity="0.15"/>
  <circle cx="80" cy="135" r="1.5" fill="#4a4a4a" opacity="0.12"/>
  <circle cx="130" cy="125" r="2" fill="#4a4a4a" opacity="0.18"/>
  <circle cx="155" cy="120" r="1.8" fill="#4a4a4a" opacity="0.1"/>

  <!-- 数字波浪（前景科技线） -->
  <path d="M0,185 Q10,175 20,180 Q30,185 40,178 Q50,170 60,175 Q70,180 80,172 Q90,165 100,170 Q110,175 120,168 Q130,160 140,165 Q150,170 160,162 Q170,155 180,160 Q190,165 200,158"
        fill="none" stroke="url(#techWave)" stroke-width="1.8" opacity="0.7"/>

  <!-- 第二层数字波浪 -->
  <path d="M0,192 Q15,185 30,190 Q45,195 60,188 Q75,182 90,186 Q105,190 120,183 Q135,177 150,182 Q165,187 180,180 Q190,175 200,180"
        fill="none" stroke="url(#techWave)" stroke-width="1.2" opacity="0.4"/>

  <!-- 科技光点（沿着波浪分布） -->
  <circle cx="40" cy="178" r="1.8" fill="url(#techGlow2)"/>
  <circle cx="90" cy="167" r="1.5" fill="url(#techGlow2)"/>
  <circle cx="140" cy="165" r="2" fill="url(#techGlow2)"/>
  <circle cx="170" cy="160" r="1.2" fill="url(#techGlow2)"/>

  <!-- 右上角：明月/圆盘 -->
  <circle cx="155" cy="45" r="22" fill="none" stroke="#a0a0a0" stroke-width="0.8" opacity="0.25"/>
  <circle cx="155" cy="45" r="18" fill="#f0ebe0" opacity="0.3"/>

  <!-- 右上角小字：风雅颂 -->
  <text x="138" y="50" font-family="'PingFang SC', 'STKaiti', 'KaiTi', serif" font-size="8" fill="#6a6a6a" opacity="0.35">风·雅·颂</text>

  <!-- 左下角朱红小印 -->
  <rect x="12" y="170" width="24" height="22" rx="2" fill="none" stroke="#c23b22" stroke-width="0.8" opacity="0.5"/>
  <text x="16" y="183" font-family="'PingFang SC', 'STKaiti', 'KaiTi', serif" font-size="7" fill="#b22a02" opacity="0.45">颂雅</text>
  <text x="16" y="189" font-family="'PingFang SC', 'STKaiti', 'KaiTi', serif" font-size="5" fill="#b22a02" opacity="0.35">blog</text>
</svg>
