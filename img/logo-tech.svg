<svg width="200" height="60" viewBox="0 0 200 60" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 暖纸底色渐变 -->
    <linearGradient id="paperBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#faf6ed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5eedb;stop-opacity:1" />
    </linearGradient>
    <!-- 朱红点缀色 -->
    <linearGradient id="sealRed" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4380d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b22a02;stop-opacity:1" />
    </linearGradient>
    <!-- 墨韵渐变 -->
    <linearGradient id="inkGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2c2c2c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4a4a4a;stop-opacity:1" />
    </linearGradient>
    <!-- 科技蓝光渐变 -->
    <linearGradient id="techGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a55e8;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0.6" />
    </linearGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 暖纸色背景 -->
  <rect width="200" height="60" fill="url(#paperBg)" rx="4"/>

  <!-- 左侧：打开的书卷图标 -->
  <!-- 书脊 -->
  <line x1="20" y1="16" x2="20" y2="44" stroke="#5c3a1e" stroke-width="1.5" opacity="0.6"/>
  <!-- 左页 -->
  <path d="M20,16 Q10,14 4,18 L4,42 Q10,38 20,44 Z" fill="#f5e6c8" stroke="#b8956a" stroke-width="0.8" opacity="0.9"/>
  <path d="M6,20 L18,30" stroke="#b8956a" stroke-width="0.5" opacity="0.4"/>
  <path d="M6,25 L18,35" stroke="#b8956a" stroke-width="0.5" opacity="0.4"/>
  <!-- 右页 -->
  <path d="M20,16 Q30,14 36,18 L36,42 Q30,38 20,44 Z" fill="#f5e6c8" stroke="#b8956a" stroke-width="0.8" opacity="0.9"/>
  <path d="M22,20 L34,30" stroke="#b8956a" stroke-width="0.5" opacity="0.4"/>
  <path d="M22,25 L34,35" stroke="#b8956a" stroke-width="0.5" opacity="0.4"/>

  <!-- 书页上的科技节点（小光点） -->
  <circle cx="20" cy="12" r="2.5" fill="url(#techGlow)" filter="url(#softGlow)"/>
  <!-- 节点微光晕 -->
  <circle cx="20" cy="12" r="4" fill="url(#techGlow)" opacity="0.25"/>

  <!-- 右侧：主标题 -->
  <!-- 颂雅风 -->
  <text x="46" y="32" font-family="'PingFang SC', 'Microsoft YaHei', 'STKaiti', 'KaiTi', serif" font-size="20" font-weight="bold" fill="url(#inkGrad)">
    颂雅风
  </text>

  <!-- 副标题 -->
  <text x="46" y="50" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="9.5" fill="#888888" opacity="0.85">
    学习知识 · 记录经验 · 传承文化
  </text>

  <!-- 朱红小方印 -->
  <rect x="172" y="42" width="16" height="14" rx="1.5" fill="none" stroke="url(#sealRed)" stroke-width="0.8" opacity="0.7"/>
  <text x="174" y="52" font-family="'PingFang SC', 'Microsoft YaHei', 'STKaiti', serif" font-size="7" fill="#b22a02" opacity="0.7">颂</text>
</svg>
