<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520">
  <defs>
    <style>
      text { font-family: 'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', 'Source Han Sans SC', 'WenQuanYi Micro Hei', sans-serif; }
    </style>
  </defs>
  <rect width="100%" height="100%" fill="#f8f9fa" rx="12"/>
  
  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" font-size="22" font-weight="bold" fill="#2c3e50">评分收敛过程</text>
  
  <!-- Axes -->
  <line x1="100" y1="420" x2="700" y2="420" stroke="#2c3e50" stroke-width="2"/>
  <line x1="100" y1="420" x2="100" y2="80" stroke="#2c3e50" stroke-width="2"/>
  
  <!-- X axis label -->
  <text x="400" y="460" text-anchor="middle" font-size="14" fill="#7f8c8d">迭代次数</text>
  <!-- Y axis label -->
  <text x="40" y="260" text-anchor="middle" font-size="14" fill="#7f8c8d" transform="rotate(-90, 40, 260)">评分（分）</text>
  
  <!-- Grid lines -->
  <line x1="100" y1="340" x2="700" y2="340" stroke="#ecf0f1" stroke-width="1"/>
  <line x1="100" y1="260" x2="700" y2="260" stroke="#ecf0f1" stroke-width="1"/>
  <line x1="100" y1="180" x2="700" y2="180" stroke="#ecf0f1" stroke-width="1"/>
  <line x1="100" y1="100" x2="700" y2="100" stroke="#ecf0f1" stroke-width="1"/>
  
  <!-- Y axis ticks -->
  <text x="85" y="424" text-anchor="end" font-size="12" fill="#95a5a6">0</text>
  <text x="85" y="344" text-anchor="end" font-size="12" fill="#95a5a6">1</text>
  <text x="85" y="264" text-anchor="end" font-size="12" fill="#95a5a6">2</text>
  <text x="85" y="184" text-anchor="end" font-size="12" fill="#95a5a6">3</text>
  <text x="85" y="104" text-anchor="end" font-size="12" fill="#95a5a6">4</text>
  
  <!-- X axis ticks -->
  <text x="160" y="435" text-anchor="middle" font-size="12" fill="#95a5a6">1</text>
  <text x="250" y="435" text-anchor="middle" font-size="12" fill="#95a5a6">2</text>
  <text x="340" y="435" text-anchor="middle" font-size="12" fill="#95a5a6">3</text>
  <text x="430" y="435" text-anchor="middle" font-size="12" fill="#95a5a6">4</text>
  <text x="520" y="435" text-anchor="middle" font-size="12" fill="#95a5a6">5</text>
  <text x="610" y="435" text-anchor="middle" font-size="12" fill="#95a5a6">6</text>
  
  <!-- Data lines -->
  <!-- P4 (suggestion): slowly drops -->
  <polyline points="100,80 160,85 250,95 340,100 430,105 520,110 610,115" fill="none" stroke="#bdc3c7" stroke-width="3"/>
  <text x="620" y="110" font-size="12" fill="#bdc3c7" font-weight="bold">P4 建议</text>
  
  <!-- P3 (low): drops then levels -->
  <polyline points="100,180 160,170 250,155 340,150 430,145 520,145 610,145" fill="none" stroke="#95a5a6" stroke-width="3"/>
  <text x="620" y="148" font-size="12" fill="#95a5a6" font-weight="bold">P3 低</text>
  
  <!-- P2 (medium): drops steadily -->
  <polyline points="100,260 160,240 250,220 340,205 430,195 520,190 610,185" fill="none" stroke="#f39c12" stroke-width="3"/>
  <text x="620" y="180" font-size="12" fill="#f39c12" font-weight="bold">P2 中</text>
  
  <!-- P1 (major): drops well -->
  <polyline points="100,340 160,310 250,280 340,255 430,240 520,230 610,225" fill="none" stroke="#e67e22" stroke-width="3"/>
  <text x="620" y="220" font-size="12" fill="#e67e22" font-weight="bold">P1 严重</text>
  
  <!-- P0 (critical): drops fastest -->
  <polyline points="100,420 160,370 250,320 340,280 430,255 520,240 610,235" fill="none" stroke="#e74c3c" stroke-width="4"/>
  <text x="620" y="240" font-size="12" fill="#e74c3c" font-weight="bold">P0 关键</text>
  
  <!-- Threshold zone -->
  <rect x="100" y="380" width="600" height="40" fill="#27ae60" opacity="0.08"/>
  <line x1="100" y1="400" x2="700" y2="400" stroke="#27ae60" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="710" y="404" font-size="13" fill="#27ae60" font-weight="bold">阈值</text>
  
  <!-- Annotation -->
  <text x="400" y="495" text-anchor="middle" font-size="13" fill="#7f8c8d">目标：所有评分最终落入阈值线以下 → 方案通过</text>
</svg>