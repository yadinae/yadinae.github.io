<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowR" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#e74c3c"/>
    </marker>
    <marker id="arrowG" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#27ae60"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa" rx="16"/>
  <text x="400" y="35" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#2c3e50">对抗式解题法 - 核心流程</text>
  <text x="400" y="55" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#7f8c8d">Solver + 6 Discriminators 迭代对抗循环</text>

  <rect x="30" y="78" width="170" height="34" rx="17" fill="#3498db"/>
  <text x="115" y="99" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="white">Phase 1 架构评审</text>
  <rect x="215" y="78" width="170" height="34" rx="17" fill="#e67e22"/>
  <text x="300" y="99" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="white">Phase 2 原型实现</text>
  <rect x="400" y="78" width="170" height="34" rx="17" fill="#9b59b6"/>
  <text x="485" y="99" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="white">Phase 3 健壮性加固</text>
  <rect x="585" y="78" width="170" height="34" rx="17" fill="#1abc9c"/>
  <text x="670" y="99" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="white">Phase 4 打磨优化</text>

  <line x1="200" y1="95" x2="213" y2="95" stroke="#7f8c8d" stroke-width="2" marker-end="url(#arrowR)"/>
  <line x1="385" y1="95" x2="398" y2="95" stroke="#7f8c8d" stroke-width="2" marker-end="url(#arrowR)"/>
  <line x1="570" y1="95" x2="583" y2="95" stroke="#7f8c8d" stroke-width="2" marker-end="url(#arrowR)"/>

  <rect x="275" y="145" width="250" height="65" rx="12" fill="#2c3e50"/>
  <text x="400" y="172" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="white">Solver 解题者</text>
  <text x="400" y="194" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#95a5a6">产出方案 / 迭代改进 / 收敛输出</text>

  <path d="M 525 178 Q 620 178 620 265 Q 620 335 530 335" fill="none" stroke="#e74c3c" stroke-width="2.5" stroke-dasharray="8,4" marker-end="url(#arrowR)"/>
  <text x="655" y="260" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#e74c3c" transform="rotate(90,655,260)">产出方案</text>

  <rect x="275" y="295" width="250" height="32" rx="6" fill="#c0392b"/>
  <text x="400" y="316" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="white">Architecture 架构判别者</text>
  <rect x="275" y="330" width="250" height="32" rx="6" fill="#d35400"/>
  <text x="400" y="351" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="white">Function 功能判别者</text>
  <rect x="275" y="365" width="250" height="32" rx="6" fill="#16a085"/>
  <text x="400" y="386" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="white">Security 安全判别者</text>
  <rect x="275" y="400" width="250" height="32" rx="6" fill="#2980b9"/>
  <text x="400" y="421" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="white">Performance 性能判别者</text>
  <rect x="275" y="435" width="250" height="32" rx="6" fill="#8e44ad"/>
  <text x="400" y="456" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="white">Compliance 合规判别者</text>
  <rect x="275" y="470" width="250" height="32" rx="6" fill="#7f8c8d"/>
  <text x="400" y="491" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="white">Style 风格判别者</text>

  <path d="M 525 400 Q 620 400 620 200 Q 620 180 525 180" fill="none" stroke="#27ae60" stroke-width="2.5" stroke-dasharray="8,4" marker-end="url(#arrowG)"/>
  <text x="655" y="290" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#27ae60" transform="rotate(90,655,290)">反馈(P0-P4)</text>

  <rect x="275" y="530" width="250" height="40" rx="10" fill="#27ae60"/>
  <text x="400" y="550" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="white">总分 < 20 且连续无P0 → 收敛</text>
  <text x="400" y="565" text-anchor="middle" font-family="sans-serif" font-size="10" fill="rgba(255,255,255,0.7)">否则返回 Solver 继续迭代</text>
</svg>