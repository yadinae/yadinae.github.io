<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 360" font-family="'PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e94560"/>
    </marker>
  </defs>
  <rect width="800" height="360" rx="16" fill="url(#bg)"/>

  <!-- Step 1 -->
  <rect x="40" y="60" width="210" height="200" rx="12" fill="#1e3a5f" stroke="#3498db" stroke-width="2"/>
  <circle cx="75" cy="85" r="14" fill="#e94560"/>
  <text x="75" y="90" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">1</text>
  <text x="145" y="92" text-anchor="middle" fill="#fff" font-size="17" font-weight="bold">安装 Hermes</text>

  <text fill="#bcd" font-size="12" text-anchor="middle">
    <tspan x="145" y="125">打开终端，输入：</tspan>
  </text>
  <rect x="55" y="135" width="180" height="30" rx="6" fill="#0a1628"/>
  <text fill="#5cf" font-size="10" text-anchor="middle">
    <tspan x="145" y="154">curl 一键安装脚本</tspan>
  </text>
  <text fill="#bcd" font-size="12" text-anchor="middle">
    <tspan x="145" y="185">或 pip install hermes-agent</tspan>
  </text>
  <text fill="#888" font-size="11" text-anchor="middle">
    <tspan x="145" y="215">⏱ 约 1-2 分钟</tspan>
    <tspan x="145" y="235">⚠ 装完记得重启终端</tspan>
  </text>

  <!-- Arrow 1→2 -->
  <line x1="250" y1="160" x2="290" y2="160" stroke="#e94560" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- Step 2 -->
  <rect x="295" y="60" width="210" height="200" rx="12" fill="#2d1b69" stroke="#9b59b6" stroke-width="2"/>
  <circle cx="330" cy="85" r="14" fill="#e94560"/>
  <text x="330" y="90" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">2</text>
  <text x="400" y="92" text-anchor="middle" fill="#fff" font-size="17" font-weight="bold">选一个"大脑"</text>

  <text fill="#dbf" font-size="12" text-anchor="middle">
    <tspan x="400" y="125">选择模型供应商：</tspan>
  </text>
  <rect x="310" y="135" width="180" height="20" rx="5" fill="#3d1f6e"/>
  <text fill="#ddd" font-size="11" text-anchor="middle">
    <tspan x="400" y="150">🏆 新手推荐：Nous Portal</tspan>
  </text>
  <rect x="310" y="160" width="180" height="20" rx="5" fill="#3d1f6e"/>
  <text fill="#ddd" font-size="11" text-anchor="middle">
    <tspan x="400" y="175">💎 免费：OpenAI / 本地模型</tspan>
  </text>
  <rect x="310" y="185" width="180" height="20" rx="5" fill="#3d1f6e"/>
  <text fill="#ddd" font-size="11" text-anchor="middle">
    <tspan x="400" y="200">🇨🇳 中文：GLM / Qwen</tspan>
  </text>

  <text fill="#888" font-size="11" text-anchor="middle">
    <tspan x="400" y="235">运行 hermes model 按提示操作</tspan>
  </text>

  <!-- Arrow 2→3 -->
  <line x1="505" y1="160" x2="545" y2="160" stroke="#e94560" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- Step 3 -->
  <rect x="550" y="60" width="210" height="200" rx="12" fill="#1b5e3a" stroke="#2ecc71" stroke-width="2"/>
  <circle cx="585" cy="85" r="14" fill="#e94560"/>
  <text x="585" y="90" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">3</text>
  <text x="655" y="92" text-anchor="middle" fill="#fff" font-size="17" font-weight="bold">开始聊天</text>

  <text fill="#cfc" font-size="12" text-anchor="middle">
    <tspan x="655" y="125">输入：</tspan>
  </text>
  <rect x="565" y="135" width="180" height="30" rx="6" fill="#0d2818"/>
  <text fill="#5f5" font-size="14" font-weight="bold" text-anchor="middle">
    <tspan x="655" y="155">hermes</tspan>
  </text>
  <text fill="#cfc" font-size="12" text-anchor="middle">
    <tspan x="655" y="190">试试问它：</tspan>
  </text>
  <text fill="#ddd" font-size="11" text-anchor="middle">
    <tspan x="655" y="210">🗣 "帮我整理一下桌面"</tspan>
    <tspan x="655" y="228">🗣 "今天有什么好新闻？"</tspan>
  </text>

  <!-- ✅ completion -->
  <text x="400" y="300" text-anchor="middle" fill="#2ecc71" font-size="18" font-weight="bold">🎉 完成！你已经拥有了自己的 Hermes Agent</text>
  <text x="400" y="325" text-anchor="middle" fill="#888" font-size="12">整个安装过程不超过 5 分钟 · 后续你可以随时增加技能、接入消息平台</text>
</svg>