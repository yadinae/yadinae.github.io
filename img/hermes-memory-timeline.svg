<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 360" font-family="'PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="360" rx="16" fill="url(#bg)"/>
  <text x="400" y="38" text-anchor="middle" fill="#fff" font-size="22" font-weight="bold">Hermes 记忆进化时间轴</text>
  <text x="400" y="60" text-anchor="middle" fill="#aaa" font-size="13">越用越懂你，记忆层层累积</text>

  <!-- Timeline line -->
  <line x1="60" y1="150" x2="740" y2="150" stroke="#e94560" stroke-width="3" stroke-dasharray="8,4"/>

  <!-- Day 1 - bubble -->
  <circle cx="130" cy="150" r="20" fill="#e94560"/>
  <text x="130" y="156" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">1</text>
  <rect x="50" y="175" width="160" height="140" rx="10" fill="#1e2a3e" stroke="#e94560" stroke-width="1"/>
  <text x="130" y="198" text-anchor="middle" fill="#faa" font-size="13" font-weight="bold">第1天 · 初识</text>
  <text fill="#ccc" font-size="11" text-anchor="middle">
    <tspan x="130" y="220">你告诉它你的身份</tspan>
    <tspan x="130" y="238">"我是技术博主"</tspan>
  </text>
  <text fill="#888" font-size="10" text-anchor="middle">
    <tspan x="130" y="262">Hermes 创建初始记忆</tspan>
    <tspan x="130" y="278">记录：身份信息</tspan>
  </text>

  <!-- Day 7 - bubble -->
  <circle cx="280" cy="150" r="20" fill="#e94560"/>
  <text x="280" y="156" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">7</text>
  <rect x="200" y="10" width="160" height="130" rx="10" fill="#1e2a3e" stroke="#00b4d8" stroke-width="1"/>
  <text x="280" y="33" text-anchor="middle" fill="#adf" font-size="13" font-weight="bold">第7天 · 习惯养成</text>
  <text fill="#ccc" font-size="11" text-anchor="middle">
    <tspan x="280" y="55">你每天问它新闻</tspan>
    <tspan x="280" y="73">它开始主动推送</tspan>
  </text>
  <text fill="#888" font-size="10" text-anchor="middle">
    <tspan x="280" y="97">Hermes 发现并记录</tspan>
    <tspan x="280" y="113">使用模式偏好</tspan>
  </text>

  <!-- Day 14 - bubble -->
  <circle cx="430" cy="150" r="20" fill="#e94560"/>
  <text x="430" y="156" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">14</text>
  <rect x="350" y="175" width="160" height="140" rx="10" fill="#1e2a3e" stroke="#06d6a0" stroke-width="1"/>
  <text x="430" y="198" text-anchor="middle" fill="#afa" font-size="13" font-weight="bold">第14天 · 深度理解</text>
  <text fill="#ccc" font-size="11" text-anchor="middle">
    <tspan x="430" y="220">它掌握你的写作风格</tspan>
    <tspan x="430" y="238">了解你的项目背景</tspan>
  </text>
  <text fill="#888" font-size="10" text-anchor="middle">
    <tspan x="430" y="262">Hermes 累积</tspan>
    <tspan x="430" y="278">多维度用户画像</tspan>
  </text>

  <!-- Day 21 - bubble -->
  <circle cx="580" cy="150" r="20" fill="#e94560"/>
  <text x="580" y="156" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">21</text>
  <rect x="500" y="10" width="160" height="130" rx="10" fill="#1e2a3e" stroke="#9b59b6" stroke-width="1"/>
  <text x="580" y="33" text-anchor="middle" fill="#dbf" font-size="13" font-weight="bold">第21天 · 主动建议</text>
  <text fill="#ccc" font-size="11" text-anchor="middle">
    <tspan x="580" y="55">它主动提出改进建议</tspan>
    <tspan x="580" y="73">帮你优化工作流</tspan>
  </text>
  <text fill="#888" font-size="10" text-anchor="middle">
    <tspan x="580" y="97">Hermes 开始从</tspan>
    <tspan x="580" y="113">被问到主动</tspan>
  </text>

  <!-- Day 30 - bubble -->
  <circle cx="710" cy="150" r="20" fill="#e94560"/>
  <text x="710" y="156" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">30</text>
  <rect x="630" y="175" width="150" height="140" rx="10" fill="#1e2a3e" stroke="#ffd700" stroke-width="1"/>
  <text x="705" y="198" text-anchor="middle" fill="#ffd700" font-size="13" font-weight="bold">第30天 · 默契</text>
  <text fill="#ccc" font-size="11" text-anchor="middle">
    <tspan x="705" y="220">它成了你的得力助手</tspan>
    <tspan x="705" y="238">默契配合，效率翻倍</tspan>
  </text>
  <text fill="#888" font-size="10" text-anchor="middle">
    <tspan x="705" y="262">Hermes 成为</tspan>
    <tspan x="705" y="278">专属 AI 队友</tspan>
  </text>

  <text x="400" y="345" text-anchor="middle" fill="#888" font-size="11">📌 记忆是持久且安全的 · 所有数据存储在你的设备上，完全由你掌控</text>
</svg>