<svg xmlns="http://www.w3.org/2000/svg" width="800" height="620" viewBox="0 0 800 620">
  <defs>
    <style>
      text { font-family: 'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', 'Source Han Sans SC', 'WenQuanYi Micro Hei', sans-serif; }
    </style>
    <marker id="arrowG" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#27ae60"/>
    </marker>
    <marker id="arrowB" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2980b9"/>
    </marker>
    <marker id="arrowO" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#e67e22"/>
    </marker>
  </defs>
  <rect width="800" height="620" fill="#f8f9fa" rx="12"/>

  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" font-size="22" font-weight="bold" fill="#2c3e50">v2 公司化组织架构图</text>

  <!-- Level 1: 用户 -->
  <rect x="300" y="70" width="200" height="50" rx="25" fill="#e67e22" opacity="0.9"/>
  <text x="400" y="101" text-anchor="middle" font-size="18" font-weight="bold" fill="#fff">🐉 用户（老板）</text>
  <text x="400" y="135" text-anchor="middle" font-size="12" fill="#e67e22">最终验收 + 退货权</text>

  <!-- Arrow: 用户 → Arena -->
  <line x1="400" y1="120" x2="400" y2="170" stroke="#27ae60" stroke-width="3" marker-end="url(#arrowG)"/>

  <!-- Level 2: Arena -->
  <rect x="275" y="175" width="250" height="55" rx="10" fill="#2980b9" opacity="0.9"/>
  <text x="400" y="203" text-anchor="middle" font-size="18" font-weight="bold" fill="#fff">🧠 我 = Arena（总经理）</text>
  <text x="400" y="221" text-anchor="middle" font-size="12" fill="#d4e6f1">组队 · 分派 · 监控 · 评审 · 培训</text>

  <!-- Horizontal line from Arena -->
  <line x1="400" y1="230" x2="400" y2="260" stroke="#2980b9" stroke-width="2"/>
  <line x1="100" y1="260" x2="700" y2="260" stroke="#2980b9" stroke-width="2"/>
  <line x1="100" y1="260" x2="100" y2="280" stroke="#2980b9" stroke-width="2" marker-end="url(#arrowB)"/>
  <line x1="400" y1="260" x2="400" y2="280" stroke="#2980b9" stroke-width="2" marker-end="url(#arrowB)"/>
  <line x1="700" y1="260" x2="700" y2="280" stroke="#2980b9" stroke-width="2" marker-end="url(#arrowB)"/>

  <!-- Level 3a: 解题者团队 -->
  <rect x="30" y="285" width="210" height="40" rx="8" fill="#3498db" opacity="0.9"/>
  <text x="135" y="311" text-anchor="middle" font-size="15" font-weight="bold" fill="#fff">👷 解题者团队</text>
  <text x="135" y="335" text-anchor="middle" font-size="11" fill="#3498db">按任务选聘 · 各司其职</text>

  <!-- Sub-roles: 解题者 -->
  <rect x="20" y="355" width="100" height="30" rx="6" fill="#ebf5fb" stroke="#3498db" stroke-width="1"/>
  <text x="70" y="375" text-anchor="middle" font-size="12" fill="#2c3e50">🏛️ 架构师</text>

  <rect x="130" y="355" width="100" height="30" rx="6" fill="#ebf5fb" stroke="#3498db" stroke-width="1"/>
  <text x="180" y="375" text-anchor="middle" font-size="12" fill="#2c3e50">📝 技术写手</text>

  <rect x="20" y="395" width="100" height="30" rx="6" fill="#ebf5fb" stroke="#3498db" stroke-width="1"/>
  <text x="70" y="415" text-anchor="middle" font-size="12" fill="#2c3e50">💻 编码专家</text>

  <rect x="130" y="395" width="100" height="30" rx="6" fill="#ebf5fb" stroke="#3498db" stroke-width="1"/>
  <text x="180" y="415" text-anchor="middle" font-size="12" fill="#2c3e50">🎨 视觉设计师</text>

  <rect x="20" y="435" width="100" height="30" rx="6" fill="#ebf5fb" stroke="#3498db" stroke-width="1"/>
  <text x="70" y="455" text-anchor="middle" font-size="12" fill="#2c3e50">🔍 调研专家</text>

  <rect x="130" y="435" width="100" height="30" rx="6" fill="#ebf5fb" stroke="#3498db" stroke-width="1"/>
  <text x="180" y="455" text-anchor="middle" font-size="12" fill="#2c3e50">⚙️ 运维专家</text>

  <!-- Level 3b: 判别者团队 -->
  <rect x="295" y="285" width="210" height="40" rx="8" fill="#e74c3c" opacity="0.9"/>
  <text x="400" y="311" text-anchor="middle" font-size="15" font-weight="bold" fill="#fff">🔍 判别者团队</text>
  <text x="400" y="335" text-anchor="middle" font-size="11" fill="#e74c3c">从质检部直聘 · 可扩展</text>

  <!-- Sub-roles: 判别者 -->
  <rect x="300" y="355" width="95" height="30" rx="6" fill="#fdedec" stroke="#e74c3c" stroke-width="1"/>
  <text x="347" y="375" text-anchor="middle" font-size="12" fill="#2c3e50">🎯 现实检验者</text>

  <rect x="405" y="355" width="95" height="30" rx="6" fill="#fdedec" stroke="#e74c3c" stroke-width="1"/>
  <text x="452" y="375" text-anchor="middle" font-size="12" fill="#2c3e50">🔌 API 测试员</text>

  <rect x="300" y="395" width="95" height="30" rx="6" fill="#fdedec" stroke="#e74c3c" stroke-width="1"/>
  <text x="347" y="415" text-anchor="middle" font-size="12" fill="#2c3e50">⚡ 性能基准师</text>

  <rect x="405" y="395" width="95" height="30" rx="6" fill="#fdedec" stroke="#e74c3c" stroke-width="1"/>
  <text x="452" y="415" text-anchor="middle" font-size="12" fill="#2c3e50">♿ 无障碍审核员</text>

  <text x="400" y="460" text-anchor="middle" font-size="11" fill="#95a5a6">+ 更多（可按需求扩展至 9+ 个角色）</text>

  <!-- Level 3c: 培训中心 -->
  <rect x="560" y="285" width="210" height="40" rx="8" fill="#27ae60" opacity="0.9"/>
  <text x="665" y="311" text-anchor="middle" font-size="15" font-weight="bold" fill="#fff">📚 培训中心</text>
  <text x="665" y="335" text-anchor="middle" font-size="11" fill="#27ae60">失职分析 → SOP 升级</text>

  <!-- Training flow details -->
  <rect x="560" y="355" width="210" height="100" rx="8" fill="#e8f8f5" stroke="#27ae60" stroke-width="1"/>
  <text x="665" y="378" text-anchor="middle" font-size="12" fill="#27ae60" font-weight="bold">🔄 失职分析流程</text>
  <text x="665" y="398" text-anchor="middle" font-size="11" fill="#2c3e50">用户拒收</text>
  <text x="665" y="414" text-anchor="middle" font-size="11" fill="#2c3e50">→ 定位失职判别者</text>
  <text x="665" y="430" text-anchor="middle" font-size="11" fill="#2c3e50">→ 追加检查项</text>
  <text x="665" y="446" text-anchor="middle" font-size="11" fill="#2c3e50">→ 质量螺旋上升 ↑</text>

  <!-- Bottom: 即插即用 -->
  <rect x="200" y="510" width="400" height="40" rx="20" fill="#8e44ad" opacity="0.85"/>
  <text x="400" y="536" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">📦 211 个即插即用专家 · agency-agents-zh 仓库</text>

  <line x1="135" y1="465" x2="400" y2="510" stroke="#8e44ad" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="400" y1="465" x2="400" y2="510" stroke="#8e44ad" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="665" y1="455" x2="400" y2="510" stroke="#8e44ad" stroke-width="1.5" stroke-dasharray="4,4"/>

  <!-- Footer note -->
  <text x="400" y="585" text-anchor="middle" font-size="11" fill="#95a5a6">v2 核心变化：从一个人单干 → 一家 AI 公司组织架构</text>
</svg>
