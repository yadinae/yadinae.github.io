<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" font-family="'PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="g1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e94560"/>
      <stop offset="100%" stop-color="#c23152"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f3460"/>
      <stop offset="100%" stop-color="#0a2647"/>
    </linearGradient>
    <linearGradient id="g3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#533483"/>
      <stop offset="100%" stop-color="#3d1f6e"/>
    </linearGradient>
    <linearGradient id="g4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00b4d8"/>
      <stop offset="100%" stop-color="#0077b6"/>
    </linearGradient>
    <linearGradient id="g5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#06d6a0"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
  </defs>
  <rect width="800" height="520" rx="16" fill="url(#bg)"/>
  <text x="400" y="45" text-anchor="middle" fill="#fff" font-size="26" font-weight="bold">Hermes Agent 五大核心能力</text>
  <text x="400" y="70" text-anchor="middle" fill="#aaa" font-size="14">由 Nous Research 开发的开源自改进 AI Agent</text>

  <!-- 能力1: 持久记忆 -->
  <rect x="30" y="100" width="220" height="170" rx="12" fill="url(#g1)" opacity="0.9"/>
  <text x="140" y="140" text-anchor="middle" fill="#fff" font-size="20" font-weight="bold">🧠 持久记忆</text>
  <text x="140" y="165" text-anchor="middle" fill="#ffd" font-size="12">MEMORY.md · USER.md</text>
  <line x1="80" y1="178" x2="200" y2="178" stroke="#ffd" stroke-width="0.5" opacity="0.5"/>
  <text fill="#eee" font-size="11" text-anchor="middle">
    <tspan x="140" y="198">记住你的偏好和习惯</tspan>
    <tspan x="140" y="215">跨会话持续累积</tspan>
    <tspan x="140" y="232">越用越懂你</tspan>
  </text>

  <!-- 能力2: 自建技能 -->
  <rect x="290" y="100" width="220" height="170" rx="12" fill="url(#g2)" opacity="0.9"/>
  <text x="400" y="140" text-anchor="middle" fill="#fff" font-size="20" font-weight="bold">🛠️ 自建技能</text>
  <text x="400" y="165" text-anchor="middle" fill="#bbd" font-size="12">自动生成 Markdown 技能文件</text>
  <line x1="340" y1="178" x2="460" y2="178" stroke="#bbd" stroke-width="0.5" opacity="0.5"/>
  <text fill="#eee" font-size="11" text-anchor="middle">
    <tspan x="400" y="198">发现重复模式 → 自动总结</tspan>
    <tspan x="400" y="215">写出可复用的技能</tspan>
    <tspan x="400" y="232">你可以随时修改或删除</tspan>
  </text>

  <!-- 能力3: 多渠道 -->
  <rect x="550" y="100" width="220" height="170" rx="12" fill="url(#g3)" opacity="0.9"/>
  <text x="660" y="140" text-anchor="middle" fill="#fff" font-size="20" font-weight="bold">📱 多渠道触达</text>
  <text x="660" y="165" text-anchor="middle" fill="#dbf" font-size="12">14+ 消息平台</text>
  <line x1="600" y1="178" x2="720" y2="178" stroke="#dbf" stroke-width="0.5" opacity="0.5"/>
  <text fill="#eee" font-size="11" text-anchor="middle">
    <tspan x="660" y="198">Telegram · Discord · Slack</tspan>
    <tspan x="660" y="215">WhatsApp · Signal · 邮件</tspan>
    <tspan x="660" y="232">终端 · Webhook</tspan>
  </text>

  <!-- 能力4: 模型自由 -->
  <rect x="30" y="310" width="350" height="170" rx="12" fill="url(#g4)" opacity="0.9"/>
  <text x="205" y="350" text-anchor="middle" fill="#fff" font-size="20" font-weight="bold">🔄 模型自由切换</text>
  <text x="205" y="375" text-anchor="middle" fill="#cef" font-size="12">20+ 模型供应商，随时切换</text>
  <line x1="80" y1="388" x2="330" y2="388" stroke="#cef" stroke-width="0.5" opacity="0.5"/>
  <text fill="#eee" font-size="11" text-anchor="middle">
    <tspan x="205" y="408">🧪 最强：Claude · GPT-5.4</tspan>
    <tspan x="205" y="425">💰 性价比：DeepSeek · GLM</tspan>
    <tspan x="205" y="442">🆓 免费：本地 Ollama 模型</tspan>
    <tspan x="205" y="459">🇨🇳 中文首选：GLM · Qwen</tspan>
  </text>

  <!-- 能力5: 定时任务 -->
  <rect x="420" y="310" width="350" height="170" rx="12" fill="url(#g5)" opacity="0.9"/>
  <text x="595" y="350" text-anchor="middle" fill="#fff" font-size="20" font-weight="bold">⏰ 定时任务</text>
  <text x="595" y="375" text-anchor="middle" fill="#cfc" font-size="12">内置 Cron 调度引擎</text>
  <line x1="470" y1="388" x2="720" y2="388" stroke="#cfc" stroke-width="0.5" opacity="0.5"/>
  <text fill="#eee" font-size="11" text-anchor="middle">
    <tspan x="595" y="408">设置一次，自动执行</tspan>
    <tspan x="595" y="425">每日日报 · 周报汇总</tspan>
    <tspan x="595" y="442">价格监控 · 通知推送</tspan>
    <tspan x="595" y="459">你睡觉时它也在工作</tspan>
  </text>

  <!-- 底部说明 -->
  <text x="400" y="508" text-anchor="middle" fill="#888" font-size="11">* Hermes Agent 是开源的 · 可运行在你的电脑或 VPS 上 · 完全掌控你的数据</text>
</svg>